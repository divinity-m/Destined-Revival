        <!-- JS -->
        <script type="module">
            import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
            import { getFirestore, doc, getDoc, setDoc, updateDoc } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore-lite.js";

            // Authenticator SDK
            import { getAuth, signInAnonymously, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";
    
            
            // The web app's Firebase configuration
            const firebaseConfig = {

            }
            
            // Initialize Firebase
            const app = initializeApp(firebaseConfig);
            const db = getFirestore(app);

            // Initialize Auth
            const auth = getAuth(app);
            
            // Trigger Email And Password Sign-in when `admin()` is called
            window.admin = function(email, password) {
                signInWithEmailAndPassword(auth, email, password).catch((error) => {
                    console.error("Login failed:", error)
                });
            }

            // Trigger Anonymous Sign-in
            signInAnonymously(auth).catch((error) => {
                 console.error("Login failed:", error);
            });

            let userExists;
            
            // Wait for the user to be authenticated before running Firestore queries
            onAuthStateChanged(auth, async (user) => {
                if (user) {
                    userExists = user;
                    console.log("Logged into the database. User UID:", user.uid);
                } else {
                    console.log("User is signed out.");
                }
            });

            // play button functions
            async function logIntoAccount(username, password) {
                if (userExists) {
                    const docRef = doc(db, "users", `${username}-${password}`);
                    const docSnap = await getDoc(docRef);
                    if (docSnap.exists()) {
                        console.log("Username:", docSnap.data().username);
                    } else {
                        console.log("No such user found!");
                    }
                }
            }

            window.logIntoAccount = logIntoAccount;
            window.createNewAccount = createNewAccount;
            
        </script>
