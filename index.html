<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />

        <title>Destined Revival</title>
        <!-- <link rel="icon" type="image/x-icon" href="Images/greyBall.svg" /> -->

        <!-- CSS -->
        <link rel="stylesheet" href="style.css"/>
        
        <!-- Fonts -->
        <style>
            /* Outfit, Carter One, and Akronim */
            @import url('https://fonts.googleapis.com/css2?family=Akronim&family=Carter+One&family=Major+Mono+Display&family=Outfit:wght@100..900&display=swap');
        </style>
        
    </head>
    <body>
        <!-- Display: None -->
        <section style="display: none">
            <!-- Audio -->
            <audio id="done-with-pain" src="Audio/Done With Pain - Thygan Buch.mp3"></audio>
            <audio id="remember" src="Audio/Remember -  SoundUniverseStudio from Pixabay.mp3"></audio>

            <!-- Images -->
            <!-- <img id="grey-ball" src="Images/greyBall.svg" /> -->
        </section>

        <main>
            <canvas id="game-canvas" width="1280px" height="720px"></canvas>

            <!-- Login Information -->
            <input id="username" class="login-info" type="text" autocomplete="off" placeholder="Username" />
            <input id="display-name" class="login-info" type="text" autocomplete="off" placeholder="Display Name" style="display: none" />
            <input id="password" class="login-info" type="text" autocomplete="off" placeholder="Password" />
            <p id="error-in-login" style="display: none; opacity: 0">unrecongnized information provided</p>
        </main>
        
        <!-- JS -->
        <script type="module">
            import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
            import { getFirestore, doc, getDoc, setDoc, updateDoc } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore-lite.js";

            // Authenticator SDK
            import { getAuth, signInAnonymously, signInWithEmailAndPassword, onAuthStateChanged, deleteUser } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";
    
            
            // The web app's Firebase configuration
            const firebaseConfig = {
                apiKey: "AIzaSyDbDb1YLJDPZxgBXaSs4fZ-IQkdZmJ8Z0w", 
                authDomain: "destined-revival.firebaseapp.com",
                projectId: "destined-revival",
                storageBucket: "destined-revival.firebasestorage.app",
                messagingSenderId: "955217871912",
                appId: "1:955217871912:web:2cd980116310e4151de11d",
                measurementId: "G-W3S0BR27TQ"
            }
            
            // Initialize Firebase
            const app = initializeApp(firebaseConfig);
            const db = getFirestore(app);

            // Initialize Auth
            const auth = getAuth(app);

            // Set up global data storage
            window.globalData = {};
            
            // Set up a function to trigger email and password sign-in
            window.globalData.admin = function(email, password) {
                signInWithEmailAndPassword(auth, email, password).catch((error) => {
                    console.error("Login failed:", error)
                });
            }

            // Trigger Anonymous Sign-in
            signInAnonymously(auth).catch((error) => {
                 console.error("Login failed:", error);
            });

            let userExists;
            
            // Wait for the user to be authenticated before running Firestore queries
            onAuthStateChanged(auth, async (user) => {
                if (user) {
                    userExists = user;
                    console.log("Logged into the database.");
                    // console.log("Logged into the database. User UID:", user.uid);
                } else {
                    console.log("User is signed out.");
                }
            });

            // play button functions
            async function logIntoAccount(username, password) {
                if (userExists) {
                    const docRef = doc(db, "users", username);
                    const docSnap = await getDoc(docRef);

                    // if the account exists, log into it
                    if (docSnap.exists()) {
                        if (docSnap.data().password === password) {
                            window.globalData.destinedData = docSnap.data();
                            globalData.reactToLoginInfo("logged in");
                        }
                        else {
                            globalData.reactToLoginInfo("invalid info");
                        }
                    }
                    else {
                        globalData.reactToLoginInfo("invalid info");
                    }
                }
            }

            async function createNewAccount(username, password, displayName) {
                if (userExists) {
                    const docRef = doc(db, "users", username);
                    const docSnap = await getDoc(docRef);

                    // check if the account already exists
                    if (docSnap.exists()) globalData.reactToLoginInfo("username exists");
                    
                    else {
                        // add a new document in the `users` collection
                        await setDoc(doc(db, "users", username), {
                            username: username,
                            password: password,
                            displayName: displayName,
                        });
                        console.log("Account Created");
                        logIntoAccount(username, password);
                    }
                }
            }
            
            window.globalData.logIntoAccount = logIntoAccount;
            window.globalData.createNewAccount = createNewAccount;

            // deletes anonymous users when they delete the tab
            ["beforeunload", "unload"].forEach((event) => {
                window.addEventListener(event, () => {
                    const user = userExists;
                    
                    if (user && user?.isAnonymous) {
                        deleteUser(user).then(() => {
                        // Successfully deleted from the Firebase backend
                        }).catch((error) => {
                            console.error("Error deleting anonymous user:", error);
                        });
                    }
                })
            })
        </script>
        <script defer src="functions.js"></script>
        <script defer src="script.js"></script>
    </body>
</html>
